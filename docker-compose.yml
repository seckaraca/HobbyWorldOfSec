version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hobby_db
    restart: always
    environment:
      POSTGRES_USER: seckin_admin
      POSTGRES_PASSWORD: hobby_password_123
      POSTGRES_DB: hobbyworld_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  jenkins:
    image: jenkins/jenkins:lts
    container_name: hobby_jenkins
    restart: always
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home

volumes:
  jenkins_home: